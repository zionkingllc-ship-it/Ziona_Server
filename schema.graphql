type Mutation {
  """
  Create a new user account with email and password. Returns user object and JWT tokens for immediate login.
  """
  register(email: String!, password: String!, fullName: String! = ""): AuthPayload!

  """
  Verify email address using verification token. Returns tokens for registration/verification or resetToken for password reset.
  """
  verifyEmail(token: String!): AuthPayload!

  """
  Authenticate existing user with email/password. Returns user data and access/refresh tokens.
  """
  login(email: String!, password: String!): AuthPayload!

  """Rotate refresh token for new token pair."""
  refreshToken(refreshToken: String!): AuthPayload!

  """
  Add password to OAuth-only account. Allows Google sign-in users to also login with password. Only works if user doesn't already have password.
  """
  addPassword(password: String!): AddPasswordPayload!

  """
  Change password for authenticated user. Requires current password. Can optionally sign out all other devices.
  """
  changePassword(currentPassword: String!, newPassword: String!, signOutOtherDevices: Boolean! = false): ChangePasswordPayload!

  """
  Authenticate user via Google OAuth. Creates account if new user, or logs in existing user. Sets needsUsernameSelection=true for new OAuth users.
  """
  googleOauth(idToken: String!): GoogleOAuthPayload!

  """
  Send one-time password code via email. Supports three purposes: registration, email_verification, password_reset. Rate-limited to 3 requests per 10 minutes.
  """
  sendOtp(email: String!, purpose: String!): OTPPayload!

  """
  Verify OTP code and complete action. For registration/email_verification returns tokens. For password_reset returns resetToken for next step.
  """
  verifyOtp(email: String!, code: String!, purpose: String!): VerifyOTPPayload!

  """
  Request password reset via email. Sends OTP code to user's email address.
  """
  resetPassword(email: String!): OTPPayload!

  """
  Complete password reset using resetToken from OTP verification. Sets new password and optionally signs out all other devices.
  """
  confirmPasswordReset(resetToken: String!, newPassword: String!, signOutAllDevices: Boolean! = false): ChangePasswordPayload!

  """
  Set permanent username after Google OAuth signup. Replaces temporary username (user_XXXXXXXX) with chosen username. Validates availability.
  """
  finalizeUsername(username: String!): AuthPayload!

  """Check if a username is available"""
  checkUsernameAvailability(username: String!): UsernameCheckResult!

  """Get username suggestions based on a name"""
  suggestUsernames(baseName: String!): [String!]!

  """Set user interests for feed personalization"""
  setInterests(interests: [String!]!): SetInterestsPayload!

  """Request a signed URL for media upload"""
  requestMediaUpload(fileName: String!, fileType: String!, fileSize: Int!): MediaUploadPayload!

  """
  Create a new multimedia app post. Supports Text, Image, and Video variants with nested Scriptures.
  """
  createPost(postType: String!, caption: String = null, category: String = null, mediaUrls: [String!] = null, mediaType: String = null, thumbnailUrl: String = null, width: Int! = 0, height: Int! = 0, duration: Int = null, scriptureBook: String = null, scriptureChapter: Int = null, scriptureVerseStart: Int = null, scriptureVerseEnd: Int = null, scriptureVersion: String = "KJV"): PostPayload!

  """Edit the caption of an existing post. Only accessible by post owner."""
  updatePost(postId: String!, caption: String = null): PostPayload!

  """Soft delete an existing post."""
  deletePost(postId: String!): PostPayload!

  """Optimistically toggle a 'like' on a specific post."""
  likePost(postId: String!): LikePayload!

  """Unlike a post"""
  unlikePost(postId: String!): LikePayload!

  """Create a nested or top-level text comment on a Post payload."""
  createComment(postId: String!, text: String!, parentCommentId: String = null): CommentPayload!

  """Delete a comment"""
  deleteComment(commentId: String!): CommentPayload!

  """Like a comment"""
  likeComment(commentId: String!): LikePayload!

  """Add bookmark saving a post strictly."""
  savePost(postId: String!, folderId: String = null): SavePayload!

  """Unsave/remove a bookmark"""
  unsavePost(postId: String!): SavePayload!

  """Create a bookmark folder"""
  createBookmarkFolder(name: String!): BookmarkFolderPayload!

  """Delete a bookmark folder"""
  deleteBookmarkFolder(folderId: String!): DeleteFolderPayload!

  """Remove multiple bookmarks at once"""
  bulkRemoveBookmarks(postIds: [String!]!): BulkRemovePayload!

  """Share a post to another user"""
  sharePostDirect(postId: String!, recipientId: String!): SharePayload!

  """Share a post externally (generate link)"""
  sharePostExternal(postId: String!): SharePayload!

  """
  Optimistically toggle a direct Edge relationship connecting to a User account globally.
  """
  followUser(userId: String!): FollowPayload!

  """Delete an existing following Edge relation targeting a User account."""
  unfollowUser(userId: String!): FollowPayload!

  """Update the authenticated user's public profile information."""
  updateProfile(bio: String = null, fullName: String = null, avatarUrl: String = null, location: String = null): ProfilePayload!

  """File a Community Guidelines violation against an active node."""
  reportContent(reason: String!, postId: String = null, commentId: String = null, description: String = null): ReportPayload!

  """Update specific report processing state dynamically (Admin only)."""
  reviewReport(reportId: String!, status: String!): ReportPayload!

  """Soft delete a notification entity explicitly targeting a UUID."""
  deleteNotification(id: ID!): DeleteNotificationResponse!
}

