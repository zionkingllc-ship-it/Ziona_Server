  """
  Get hierarchical chronologically descending array of all User Nodes following a Profile.
  """
  followers(userId: String!, cursor: String = null, limit: Int! = 20): FollowListResponse!

  """
  Get hierarchical descending list of all User Nodes a particular Profile is following.
  """
  following(userId: String!, cursor: String = null, limit: Int! = 20): FollowListResponse!

  """
  Get highly validated creators algorithmically dynamically curated for the authenticating user.
  """
  suggestedCreators(limit: Int! = 10): [SuggestedCreatorType!]!

  """Retrieve a targeted user's public profile and follower statistics."""
  userProfile(userId: String!): UserProfileType

  """Get paginated list of posts the targeted user has liked."""
  likedPosts(userId: String!, limit: Int! = 20, cursor: String = null): ProfilePostResponseListDTO!

  """Get hierarchical chronological array of comments bounded to an entity."""
  postComments(postId: String!, cursor: String = null, limit: Int! = 20): CommentsResponse!

  """Get bookmark folders"""
  bookmarkFolders: [BookmarkFolderType!]!

  """Get friends list for sharing"""
  friendsList(search: String = null, limit: Int! = 20): [FriendType!]!

  """Get saved/bookmarked posts"""
  savedPosts(folderId: String = null, mediaType: String! = "all", cursor: String = null, limit: Int! = 20): SavedPostsResponse!

  """Extract paginated array list of raw Admin reports queued."""
  listReports(status: String = null, cursor: String = null, limit: Int! = 20): ReportListResponse!

  """
  Retrieve descending paginated array of authenticated user's notifications natively.
  """
  notifications(filter: String! = "all", cursor: String = null, limit: Int! = 20): NotificationResponseListDTO!

  """
  Retrieve a single post by its UUID with full engagement metrics and viewer context.
