# Render deployment configuration
#
# Production uses native Python runtime plus imageio-ffmpeg; no Docker image is
# needed for media workers. Scheduled jobs are Render cron services instead of a
# continuously running Celery beat service to keep monthly cost lower.

services:
  - type: web
    name: ziona-api-staging
    runtime: python
    region: oregon
    plan: starter
    branch: staging
    autoDeployTrigger: checksPass
    buildCommand: &buildCommand >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --keep-alive 120
    envVars: &stagingEnv
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_HOSTS
        value: ziona-api-staging.onrender.com
      - key: ENABLE_DJANGO_ADMIN
        value: "true"
      - key: ENABLE_PUBLIC_API_DOCS
        value: "true"
      - key: ENABLE_GRAPHQL_STATIC_DOCS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: APPLE_BUNDLE_ID
        value: com.zionking.ziona
      - key: APPLE_CLIENT_IDS
        sync: false
      - key: ENSEND_API_KEY
        sync: false
      - key: ENSEND_API_URL
        value: https://api.smtpexpress.com/send
      - key: DEFAULT_FROM_EMAIL
        value: noreply@ziona.app
      - key: ENSEND_SENDER_NAME
        value: Ziona Team
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_ONE_TIME_PRODUCT_ID
        sync: false
      - key: STRIPE_MONTHLY_PRODUCT_ID
        sync: false
      - key: STRIPE_CHECKOUT_SUCCESS_URL
        value: https://ziona-app-staging.netlify.app/support/success
      - key: STRIPE_CHECKOUT_CANCEL_URL
        value: https://ziona-app-staging.netlify.app/support
      - key: STRIPE_PORTAL_RETURN_URL
        value: https://ziona-app-staging.netlify.app/settings/support
      - key: STRIPE_PORTAL_LOGIN_URL
        sync: false
      - key: STRIPE_SUPPORT_MAX_AMOUNT_USD
        value: "10000"
      - key: STRIPE_CURRENCY
        value: usd
      - key: CORS_ALLOWED_ORIGINS
        value: https://ziona-app-staging.netlify.app,https://ziona-admin-dashboard-git-staging-zionking-llc.vercel.app,https://ziona-admin-dashboard.vercel.app
      - key: GCS_CORS_ALLOWED_ORIGINS
        value: https://ziona-app-staging.netlify.app,https://ziona-admin-dashboard-git-staging-zionking-llc.vercel.app,https://ziona-admin-dashboard.vercel.app
      - key: GCP_STORAGE_BUCKET
        value: ziona-media-dev
      - key: MEDIA_STALE_UPLOAD_MINUTES
        value: "15"
      - key: GCP_CREDENTIALS_FILE
        value: /etc/secrets/gcp-credentials.json
      - key: FIREBASE_CREDENTIALS_FILE
        value: /etc/secrets/firebase-credentials.json
      - key: ACCOUNT_RECOVERY_TOKEN_LIFETIME_MINUTES
        value: "15"
      - key: ACCOUNT_DELETION_GRACE_DAYS
        value: "30"
      - key: ACCOUNT_DELETION_PURGE_MAX_RETRIES
        value: "5"

  - type: worker
    name: ziona-worker-staging
    runtime: python
    region: oregon
    plan: starter
    branch: staging
    autoDeployTrigger: checksPass
    buildCommand: *buildCommand
    startCommand: python manage.py check_media_runtime && celery -A config worker --loglevel=info --concurrency=1 -Q email,default,media,cron
    envVars: *stagingEnv

  - type: web
    name: ziona-api-prod
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    buildCommand: *buildCommand
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --keep-alive 120
    envVars: &prodEnv
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_HOSTS
        value: api.ziona.app,ziona-server.onrender.com
      - key: ENABLE_DJANGO_ADMIN
        value: "false"
      - key: ENABLE_PUBLIC_API_DOCS
        value: "false"
      - key: ENABLE_GRAPHQL_STATIC_DOCS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: https://ziona.app,https://www.ziona.app,https://admin.ziona.app,https://zionking.org,https://www.zionking.org
      - key: GCS_CORS_ALLOWED_ORIGINS
        value: https://ziona.app,https://www.ziona.app,https://admin.ziona.app,https://zionking.org,https://www.zionking.org
      - key: GCP_STORAGE_BUCKET
        value: ziona-media-prod
      - key: MEDIA_STALE_UPLOAD_MINUTES
        value: "15"
      - key: GCP_CREDENTIALS_FILE
        value: /etc/secrets/gcp-credentials.json
      - key: FIREBASE_CREDENTIALS_FILE
        value: /etc/secrets/firebase-credentials.json
      - key: ACCOUNT_RECOVERY_TOKEN_LIFETIME_MINUTES
        value: "15"
      - key: ACCOUNT_DELETION_GRACE_DAYS
        value: "30"
      - key: ACCOUNT_DELETION_PURGE_MAX_RETRIES
        value: "5"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: APPLE_BUNDLE_ID
        value: com.zionking.ziona
      - key: APPLE_CLIENT_IDS
        sync: false
      - key: ENSEND_API_KEY
        sync: false
      - key: ENSEND_API_URL
        value: https://api.smtpexpress.com/send
      - key: DEFAULT_FROM_EMAIL
        value: noreply@ziona.app
      - key: ENSEND_SENDER_NAME
        value: Ziona Team
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_ONE_TIME_PRODUCT_ID
        sync: false
      - key: STRIPE_MONTHLY_PRODUCT_ID
        sync: false
      - key: STRIPE_CHECKOUT_SUCCESS_URL
        value: https://ziona.app/support/success
      - key: STRIPE_CHECKOUT_CANCEL_URL
        value: https://ziona.app/support
      - key: STRIPE_PORTAL_RETURN_URL
        value: https://ziona.app/settings/support
      - key: STRIPE_PORTAL_LOGIN_URL
        sync: false
      - key: STRIPE_SUPPORT_MAX_AMOUNT_USD
        value: "10000"
      - key: STRIPE_CURRENCY
        value: usd

  - type: worker
    name: ziona-worker-prod
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    buildCommand: *buildCommand
    startCommand: python manage.py check_media_runtime && celery -A config worker --loglevel=info --concurrency=1 -Q email,default,media,cron
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-check-scheduled-anchors
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "*/5 * * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task check-scheduled-anchors
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-refresh-dashboard-cache
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "*/15 * * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task refresh-dashboard-cache
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-refresh-company-stats
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "0 * * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task refresh-company-stats
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-daily-anchor-notifications
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "0 18 * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task send-daily-anchor-notifications
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-notification-digest
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "0 8 * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task send-daily-notification-digest
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-daily-analytics
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "5 0 * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task calculate-daily-analytics
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-expired-anchor-purge
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "0 2 * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task purge-expired-anchors
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-notification-cleanup
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "0 2 * * 0"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task cleanup-old-notifications
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-stale-media-cleanup
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "*/10 * * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task cleanup-stale-media
    envVars: *prodEnv

  - type: cron
    name: ziona-cron-account-deletion-purge
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "17 * * * *"
    buildCommand: *buildCommand
    startCommand: python manage.py enqueue_scheduled_task purge-due-account-deletions
    envVars: *prodEnv
