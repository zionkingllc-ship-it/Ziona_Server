# Render deployment configuration
# https://render.com/docs/deploy-django

services:
  - type: web
    name: ziona-api-staging
    runtime: python
    region: oregon
    plan: free
    branch: staging
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: ziona-db-staging
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: ziona-redis-staging
          property: connectionString

  - type: redis
    name: ziona-redis-staging
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru

databases:
  - name: ziona-db-staging
    plan: free
    region: oregon
    postgresMajorVersion: "15"
