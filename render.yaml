# Render deployment configuration

services:
  - type: web
    name: ziona-api-staging
    runtime: python
    region: oregon
    plan: starter
    branch: staging
    buildCommand: >-
      pip install -r requirements.txt && 
      python manage.py migrate --noinput && 
      python manage.py setup_test_admin &&
      python manage.py seed_legal_documents &&
      python manage.py collectstatic --noinput && 
      python manage.py seed_circle_sample_data &&
      python manage.py shell -c "from strawberry.printer import print_schema; from config.graphql_schema import schema; open('schema.graphql', 'w').write(print_schema(schema))" && 
      python manage.py import_bible kjv asv web rv --resume && 
      npm install && 
      npm run docs:build
    startCommand: celery -A config worker --loglevel=info --concurrency=1 & gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --keep-alive 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_HOSTS
        value: ziona-api-staging.onrender.com
      - key: DATABASE_URL
        sync: false
      
      - key: REDIS_URL
        sync: false

      - key: CELERY_BROKER_URL
        sync: false

      - key: CELERY_RESULT_BACKEND
        sync: false

      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: ENSEND_API_KEY
        sync: false
      - key: ENSEND_API_URL
        value: https://api.smtpexpress.com/send
      - key: DEFAULT_FROM_EMAIL
        value: zionking--llc-61791b@ensend.me
      - key: ENSEND_SENDER_NAME
        value: Ziona Team

      - key: SENTRY_DSN
        sync: false

      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:19006,https://ziona-app-staging.netlify.app,https://ziona-admin-dashboard.vercel.app
      - key: GCS_CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:19006,https://ziona-app-staging.netlify.app,https://ziona-admin-dashboard.vercel.app
