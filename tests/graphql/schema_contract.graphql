  postComments(cursor: String = null, limit: Int! = 20, postId: String!): CommentsResponse!

  """Returns the currently active Privacy Policy."""
  privacyPolicy: LegalDocumentType!
  responseReplies(limit: Int! = 50, responseId: String!): [AnchorResponseType!]!

  """Get saved/bookmarked posts"""
  savedPosts(cursor: String = null, folderId: String = null, limit: Int! = 20, mediaType: String! = "all"): SavedPostsResponse!

  """
  Fetch all verses in a chapter. Returns a ScriptureResponse with book, chapter, version, and every verse in the chapter.
  """
  scripture(book: String!, chapter: Int!, translation: String! = "KJV"): ScriptureResponse!

  """
  Fetch verses in a range and return combined text as a single string. No verse numbers included — just the concatenated text.
  """
  scriptureRange(book: String!, chapter: Int!, translation: String! = "KJV", verseEnd: Int = null, verseStart: Int! = 1): String!

  """
  Generate 4 available username suggestions based on email and optional date of birth. Returns unique, available usernames.
  """
  suggestUsernames(dateOfBirth: String = null, dob: String = null, email: String!): [String!]!
  suggestedCircles(limit: Int! = 10): [CircleType!]!

  """
  Get highly validated creators algorithmically dynamically curated for the authenticating user.
  """
  suggestedCreators(limit: Int! = 10): [SuggestedCreatorType!]!

  """Returns the currently active Terms of Service."""
  termsOfService: LegalDocumentType!
  unreadNotificationCount: Int!

  """Get paginated list of posts authored by the targeted user."""
  userPosts(cursor: String = null, limit: Int! = 20, userId: String!): ProfilePostResponseListDTO!

  """Retrieve a targeted user's public profile and follower statistics."""
  userProfile(userId: String!): UserProfileType
}

