name: Ziona CI/CD

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DATABASE_URL: sqlite:///db.sqlite3
  REDIS_URL: redis://localhost:6379/0
  DJANGO_SECRET_KEY: ci-only-django-secret-key-long-enough-for-deploy-checks-123456789 # pragma: allowlist secret
  JWT_SECRET_KEY: ci-only-jwt-secret-key-long-enough-for-tests-123456789 # pragma: allowlist secret
  ENCRYPTION_KEY: KmL2Fsoq9wd1MR_wy_QKdKI-ghgEsnU-VBSyCrEV-Bs=
  SECRET_SCAN_EXCLUDES: '(^|/)(\.git|\.secrets\.baseline|venv|\.venv|__pycache__|\.pytest_cache|\.mypy_cache|\.ruff_cache|node_modules|\.next|out|build|coverage)(/|$)'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install lint dependencies
        run: pip install ruff==0.2.0 mypy==1.8.0 django-stubs==4.2.7

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: pytest --cov=core --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Check repository secrets baseline
        run: |
          if [ ! -f .secrets.baseline ]; then
            echo "::error::.secrets.baseline is missing"
            exit 1
          fi
          bad_env_files="$(git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '(^|/)\.env\.example$' || true)"
          if [ -n "$bad_env_files" ]; then
            echo "::error::Committed .env-style files found:"
            echo "$bad_env_files"
            exit 1
          fi
          bad_credential_files="$(git ls-files | grep -Ei '(^|/).*([.]pem|[.]key|credentials[^/]*[.]json)$' || true)"
          if [ -n "$bad_credential_files" ]; then
            echo "::error::Committed credential files found:"
            echo "$bad_credential_files"
            exit 1
          fi
          detect-secrets scan --all-files \
            --exclude-files "$SECRET_SCAN_EXCLUDES" \
            > detect-secrets-report.json
          python - <<'PY'
          import json
          import sys

          with open(".secrets.baseline", encoding="utf-8") as fh:
              baseline = json.load(fh)
          with open("detect-secrets-report.json", encoding="utf-8") as fh:
              report = json.load(fh)

          accepted = {
              (path, item.get("type"), item.get("hashed_secret"))
              for path, items in baseline.get("results", {}).items()
              for item in items
          }
          findings = [
              (path, item.get("type", "unknown"))
              for path, items in report.get("results", {}).items()
              for item in items
              if (path, item.get("type"), item.get("hashed_secret")) not in accepted
          ]

          if findings:
              print("::error::Potential new secrets detected:")
              for path, finding_type in findings[:25]:
                  print(f"- {path}: {finding_type}")
              if len(findings) > 25:
                  print(f"...and {len(findings) - 25} more finding(s)")
              sys.exit(1)
          PY

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit==2.10.0

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --progress-spinner off

  production-sanity:
    name: Production Sanity
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: sqlite:///db.sqlite3
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      ALLOWED_HOSTS: api.ziona.app,ziona-server.onrender.com
      CORS_ALLOWED_ORIGINS: https://ziona.app,https://www.ziona.app,https://admin.ziona.app
      GCS_CORS_ALLOWED_ORIGINS: https://ziona.app,https://www.ziona.app,https://admin.ziona.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate production settings import
        run: python -c "import django; django.setup()"

      - name: Run Django deploy checks
        run: python manage.py check --deploy

      - name: Validate media runtime
        run: python manage.py check_media_runtime

      - name: Validate Render blueprint
        run: python manage.py validate_render_blueprint

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint, test, secret-scan, dependency-audit, production-sanity]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Trigger Render staging deploy
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_STAGING_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_STAGING_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_STAGING_DEPLOY_HOOK_URL"

      - name: Wait for staging to start
        run: sleep 30

      - name: Smoke test staging health endpoint
        run: curl -fsS https://ziona-api-staging.onrender.com/health

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test, secret-scan, dependency-audit, production-sanity]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Trigger Render production deploy
        env:
          RENDER_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_PRODUCTION_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_PRODUCTION_DEPLOY_HOOK_URL"

      - name: Wait for production to start
        run: sleep 30

      - name: Smoke test production health endpoint
        env:
          PRODUCTION_HEALTHCHECK_URL: ${{ vars.PRODUCTION_HEALTHCHECK_URL }}
        run: |
          if [ -z "$PRODUCTION_HEALTHCHECK_URL" ]; then
            echo "::error::PRODUCTION_HEALTHCHECK_URL is not set"
            exit 1
          fi
          curl -fsS "$PRODUCTION_HEALTHCHECK_URL"
