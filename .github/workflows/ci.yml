name: Ziona CI/CD

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DATABASE_URL: sqlite:///db.sqlite3
  REDIS_URL: redis://localhost:6379/0
  DJANGO_SECRET_KEY: ci-test-secret-key
  JWT_SECRET_KEY: ci-test-jwt-key
  ENCRYPTION_KEY: KmL2Fsoq9wd1MR_wy_QKdKI-ghgEsnU-VBSyCrEV-Bs=

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install lint dependencies
        run: pip install ruff==0.2.0 mypy==1.8.0 django-stubs==4.2.7

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: pytest --cov=core --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Trigger Render staging deploy
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_STAGING_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_STAGING_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_STAGING_DEPLOY_HOOK_URL"

      - name: Wait for staging to start
        run: sleep 30

      - name: Smoke test staging health endpoint
        run: curl -fsS https://ziona-api-staging.onrender.com/health

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Trigger Render production deploy
        env:
          RENDER_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_PRODUCTION_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_PRODUCTION_DEPLOY_HOOK_URL"

      - name: Wait for production to start
        run: sleep 30

      - name: Smoke test production health endpoint
        env:
          PRODUCTION_HEALTHCHECK_URL: ${{ vars.PRODUCTION_HEALTHCHECK_URL }}
        run: |
          if [ -z "$PRODUCTION_HEALTHCHECK_URL" ]; then
            echo "::error::PRODUCTION_HEALTHCHECK_URL is not set"
            exit 1
          fi
          curl -fsS "$PRODUCTION_HEALTHCHECK_URL"
