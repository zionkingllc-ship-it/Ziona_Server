name: Ziona CI/CD

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ziona-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DATABASE_URL: sqlite:///db.sqlite3
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  CELERY_RESULT_BACKEND: redis://localhost:6379/0
  DJANGO_SECRET_KEY: ci-test-secret-key # pragma: allowlist secret
  JWT_SECRET_KEY: ci-test-jwt-key # pragma: allowlist secret
  ENCRYPTION_KEY: KmL2Fsoq9wd1MR_wy_QKdKI-ghgEsnU-VBSyCrEV-Bs= # pragma: allowlist secret
  DEFAULT_FROM_EMAIL: noreply@ziona.app
  ENSEND_API_KEY: ci-test-ensend-key # pragma: allowlist secret

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.2.0

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: pytest --cov=core --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets pip-audit

      - name: Guard against committed environment files
        run: |
          violations="$(find . -type f \( -name '.env' -o -name '.env.*' \) \
            ! -name '.env.example' \
            ! -path './.git/*' \
            ! -path './venv/*' \
            ! -path './.venv/*' \
            ! -path './node_modules/*' \
            -print)"
          if [ -n "$violations" ]; then
            echo "::error::Environment file(s) found in repository:"
            echo "$violations"
            exit 1
          fi

      - name: Scan for potential secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '(^|/)(\.git|venv|venv_win|\.venv|env|node_modules|mediafiles|staticfiles|\.pytest_cache|\.ruff_cache|__pycache__|htmlcov|docs/graphql-docs|public/docs)(/|$)' \
            > detect-secrets-report.json
          python - <<'PY'
          import json
          import sys

          with open("detect-secrets-report.json", encoding="utf-8") as fh:
              report = json.load(fh)

          findings = [
              (path, item.get("type", "unknown"))
              for path, items in report.get("results", {}).items()
              for item in items
          ]

          if findings:
              print("::error::Potential secrets detected:")
              for path, finding_type in findings[:25]:
                  print(f"- {path}: {finding_type}")
              if len(findings) > 25:
                  print(f"...and {len(findings) - 25} more finding(s)")
              sys.exit(1)
          PY

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detect-secrets-report
          path: detect-secrets-report.json

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test, security-gate]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: https://ziona-api-staging.onrender.com
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
      HEALTH_URL: https://ziona-api-staging.onrender.com/health
    steps:
      - name: Trigger Render staging deploy
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_STAGING_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Staging deployment triggered on Render."

      - name: Smoke test staging health endpoint
        run: |
          sleep 120
          for attempt in {1..10}; do
            body="$(curl -fsS "$HEALTH_URL" || true)"
            if echo "$body" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "Staging smoke test passed."
              exit 0
            fi
            echo "::warning::Staging health check failed on attempt ${attempt}/10."
            sleep 30
          done
          echo "::error::Staging health check failed after deploy. Manual rollback via Render dashboard may be required."
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test, security-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_API_URL }}
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
      HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}
    steps:
      - name: Trigger Render production deploy
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_PRODUCTION_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi
          if [ -z "$HEALTH_URL" ]; then
            echo "::error::PRODUCTION_HEALTH_URL GitHub variable is not configured."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Production deployment triggered on Render."

      - name: Smoke test production health endpoint
        run: |
          sleep 120
          for attempt in {1..10}; do
            body="$(curl -fsS "$HEALTH_URL" || true)"
            if echo "$body" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "Production smoke test passed."
              exit 0
            fi
            echo "::warning::Production health check failed on attempt ${attempt}/10."
            sleep 30
          done
          echo "::error::Production health check failed after deploy. Manual rollback via Render dashboard may be required."
          exit 1
